name: Build Booger Client

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Verify Java 21 is active
        run: java -version

      - name: Make gradlew executable
        run: chmod +x client/gradlew

      - name: Build mod JAR
        working-directory: client
        run: ./gradlew build --no-daemon -Dorg.gradle.java.home=$JAVA_HOME

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: booger-client-jar
          path: client/build/libs/booger-client-*.jar
          if-no-files-found: warn
