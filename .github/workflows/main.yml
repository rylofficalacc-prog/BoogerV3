name: Build Booger Client

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      - run: chmod +x gradlew

      - run: ./gradlew build

      - uses: actions/upload-artifact@v3
        with:
          name: booger-client
          path: "client/build/libs/*.jar"
