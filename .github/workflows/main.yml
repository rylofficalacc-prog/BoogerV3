name: Build Booger Client

on:
push:
branches: [ "main" ]

jobs:
build:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout code
    uses: actions/checkout@v3

  - name: Set up Java 17
    uses: actions/setup-java@v3
    with:
      distribution: 'temurin'
      java-version: '17'

  - name: Make Gradle executable
    run: chmod +x gradlew

  - name: Build project
    run: ./gradlew build

  - name: Upload JAR
    uses: actions/upload-artifact@v3
    with:
      name: booger-client
      path: **/build/libs/*.jar
```
